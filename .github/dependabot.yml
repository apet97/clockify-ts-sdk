version: 2

# Dependabot keeps all three workspaces' npm dependencies and the
# repo's GitHub Actions versions current. Weekly cadence — low
# enough to avoid noise, high enough that we won't drift more
# than ~7 days behind upstream security fixes.
#
# All three workspaces (/wrapper, /cli, /mcp) are monitored. The
# synced SDK under wrapper/src/** is regenerated by the local
# generator, so the wrapper carries devDependencies only; cli and
# mcp additionally ship runtime dependencies (commander, picocolors,
# cli-table3 in cli; @modelcontextprotocol/sdk, zod in mcp).

updates:
  - package-ecosystem: "npm"
    directory: "/wrapper"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "npm"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "npm"
    directory: "/mcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
