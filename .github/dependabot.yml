version: 2

# Dependabot keeps the wrapper's npm devDependencies and the
# repo's GitHub Actions versions current. Weekly cadence — low
# enough to avoid noise, high enough that we won't drift more
# than ~7 days behind upstream security fixes.
#
# The synced SDK under wrapper/src/** is regenerated by Fern, so
# it has no `dependencies` of its own; the wrapper/package.json
# devDeps are the only npm surface dependabot needs to watch.

updates:
  - package-ecosystem: "npm"
    directory: "/wrapper"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
