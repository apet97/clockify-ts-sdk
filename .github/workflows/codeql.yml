name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly cron so we catch new CodeQL queries even between PRs.
  schedule:
    - cron: "23 4 * * 1"

# Opt in to the Node.js 24 runner for actions still pinned to Node 20
# major versions. Same rationale as ci.yml / release.yml / docs.yml.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Scope the analysis to the hand-written surface across all
          # three packages (wrapper root, cli/src, mcp/src) plus the
          # repo automation scripts and workflow files. wrapper/src/**
          # is locally generated output (regenerated); any finding
          # there belongs upstream in GOCLMCP, not in this repo's
          # security tab, so it is excluded via paths-ignore. Built
          # output (**/dist) is excluded as a belt-and-suspenders.
          config: |
            paths:
              - wrapper
              - cli/src
              - mcp/src
              - scripts
              - .github/workflows
            paths-ignore:
              - wrapper/src
              - "**/dist"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
