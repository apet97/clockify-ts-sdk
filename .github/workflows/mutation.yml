name: Mutation

on:
  workflow_dispatch:
    inputs:
      target:
        description: Mutation target to run
        required: true
        default: all
        type: choice
        options:
          - all
          - wrapper
          - mcp

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOCKIFY_API_KEY: ""
  CLOCKIFY_WORKSPACE_ID: ""

jobs:
  mutation:
    name: Stryker mutation (${{ inputs.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Setup Node.js 22.13.0
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces (root)
        run: npm ci

      - name: Generate + sync TS SDK (local generator)
        run: make sdk-codegen

      - name: Run full mutation gate
        if: ${{ inputs.target == 'all' }}
        run: make mutation

      - name: Run wrapper mutation
        if: ${{ inputs.target == 'wrapper' }}
        run: npm run mutation -w clockify-sdk-ts-115

      - name: Check wrapper mutation floor
        if: ${{ inputs.target == 'wrapper' }}
        run: node scripts/check-mutation-score.mjs --package wrapper

      - name: Run MCP mutation
        if: ${{ inputs.target == 'mcp' }}
        run: npm run mutation -w @apet97/clockify-mcp-115

      - name: Check MCP mutation floor
        if: ${{ inputs.target == 'mcp' }}
        run: node scripts/check-mutation-score.mjs --package mcp

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-reports-${{ inputs.target }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 14
          path: |
            wrapper/reports/mutation/**
            mcp/reports/mutation/**
