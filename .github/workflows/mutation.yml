name: Mutation

on:
  workflow_dispatch:
    inputs:
      target:
        description: Mutation target to run
        required: true
        default: all
        type: choice
        options:
          - all
          - wrapper
          - mcp
          - cli

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOCKIFY_API_KEY: ""
  CLOCKIFY_WORKSPACE_ID: ""

jobs:
  mutation:
    name: Stryker mutation (${{ inputs.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js 22.13.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces (root)
        run: npm ci

      - name: Generate + sync TS SDK (local generator)
        run: make sdk-codegen

      - name: Run full mutation gate
        if: ${{ inputs.target == 'all' }}
        run: make mutation

      - name: Run wrapper mutation
        if: ${{ inputs.target == 'wrapper' }}
        run: npm run mutation -w clockify-sdk-ts-115

      - name: Check wrapper mutation floor
        if: ${{ inputs.target == 'wrapper' }}
        run: node scripts/check-mutation-score.mjs --package wrapper

      - name: Run MCP mutation
        if: ${{ inputs.target == 'mcp' }}
        run: npm run mutation -w @apet97/clockify-mcp-115

      - name: Check MCP mutation floor
        if: ${{ inputs.target == 'mcp' }}
        run: node scripts/check-mutation-score.mjs --package mcp

      - name: Run CLI mutation
        if: ${{ inputs.target == 'cli' }}
        run: npm run mutation -w @apet97/clockify-cli-115

      - name: Check CLI mutation floor
        if: ${{ inputs.target == 'cli' }}
        run: node scripts/check-mutation-score.mjs --package cli

      - name: Verify expected mutation reports
        id: mutation-reports
        if: always()
        shell: bash
        run: |
          case "${{ inputs.target }}" in
            all)
              reports=$'wrapper/reports/mutation/mutation.json\nmcp/reports/mutation/mutation.json\ncli/reports/mutation/mutation.json'
              ;;
            wrapper)
              reports='wrapper/reports/mutation/mutation.json'
              ;;
            mcp)
              reports='mcp/reports/mutation/mutation.json'
              ;;
            cli)
              reports='cli/reports/mutation/mutation.json'
              ;;
            *)
              echo "Unsupported mutation target: ${{ inputs.target }}" >&2
              exit 1
              ;;
          esac
          {
            echo 'paths<<EOF'
            echo "$reports"
            echo EOF
          } >> "$GITHUB_OUTPUT"
          while IFS= read -r report; do
            test -f "$report"
          done <<< "$reports"

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-reports-${{ inputs.target }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 14
          path: ${{ steps.mutation-reports.outputs.paths }}
