name: Docs

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Opt in to the Node.js 24 runner for actions still pinned to Node 20
# major versions. Same rationale as ci.yml and release.yml — see
# ci.yml's comment block for the full reasoning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent docs deployment; queue runs cancel
# in-progress ones (we always want the latest tag's docs on Pages).
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build TypeDoc and deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    defaults:
      run:
        working-directory: wrapper
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces (root)
        working-directory: .
        run: npm ci

      - name: Generate + sync TS SDK (local generator)
        working-directory: .
        run: make sdk-codegen

      - name: Build TypeDoc site
        run: npm run docs

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          # Auto-enable GitHub Pages if it's not already on for the
          # repo (avoids the 404 "Pages not found" failure on the
          # first tag push to a fresh repo). Requires the
          # `pages: write` permission already declared above.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
