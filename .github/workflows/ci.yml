name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt in to the Node.js 24 runner for actions still pinned to Node 20
# major versions. GitHub announced (2026-05) that Node.js 20 actions
# will be force-promoted on 2026-06-02; setting this flag locks in
# that behaviour today so the workflow's runtime doesn't change
# silently mid-flight. Once we bump checkout / setup-node to majors
# whose default runtime is already Node 24, this flag can be removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: Build, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: wrapper
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: wrapper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync SDK from generator output
        run: npm run sync

      - name: Type-check
        run: npm run type-check

      - name: Build (emit dist/)
        run: npm run build

      - name: Run tests
        run: npm test
        # The sandbox-flow tests in tests/sandbox.test.ts skip cleanly
        # when CLOCKIFY_API_KEY / CLOCKIFY_WORKSPACE_ID are absent.
        # GitHub-hosted CI deliberately does not get production creds.

      - name: Pack dry-run
        run: npm pack --dry-run
