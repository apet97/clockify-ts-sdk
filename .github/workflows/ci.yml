name: Workspace CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  packages:
    name: ${{ matrix.target.package }} / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ["22.13.0", "24"]
        target:
          - package: wrapper
            workspace: clockify-sdk-ts-115
          - package: cli
            workspace: "@apet97/clockify-cli-115"
          - package: mcp
            workspace: "@apet97/clockify-mcp-115"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Generate SDK and build dependency
        run: |
          make sdk-codegen
          npm run build -w clockify-sdk-ts-115
      - run: npm run lint -w ${{ matrix.target.workspace }}
      - run: npm run type-check -w ${{ matrix.target.workspace }}
      - run: npm test -w ${{ matrix.target.workspace }}
      - run: npm run build -w ${{ matrix.target.workspace }}
      - if: matrix.target.package == 'wrapper'
        run: npm run build:smoke -w clockify-sdk-ts-115
      - if: matrix.node == '22.13.0'
        run: node scripts/pack-snapshot.mjs --pkg=${{ matrix.target.package }} --check

  contracts:
    name: Contracts and coverage / Node 22.13.0
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22.13.0"
          cache: npm
      - run: npm ci
      - run: make sdk-codegen
      - run: npm run build
      - name: Doc and contract drift suite
        run: make contract-gates
        env:
          CLOCKIFY_API_KEY: ""
          CLOCKIFY_WORKSPACE_ID: ""
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      - name: Executable contract and coverage proof
        run: >-
          make sdk-codegen-drift sdk-codegen-test codegen-determinism
          build-determinism generator-comparison pack-smoke coverage mutation-ci
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      - run: npm audit --omit=dev
