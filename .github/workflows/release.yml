name: Release to npm

on:
  push:
    tags:
      - "v*.*.*"

# Opt in to the Node.js 24 runner for actions still pinned to Node 20
# major versions. See ci.yml for the rationale; both workflows must
# carry the flag so a release-time runtime change can't sneak in
# while the CI workflow keeps the new default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish clockify-sdk-ts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: wrapper
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: wrapper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync, type-check, build
        run: |
          npm run sync
          npm run type-check
          npm run build

      - name: Verify tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm (with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
