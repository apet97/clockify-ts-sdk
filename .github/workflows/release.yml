name: Release to npm

on:
  push:
    tags:
      - "v*.*.*"

# Opt in to the Node.js 24 runner for actions still pinned to Node 20
# major versions. See ci.yml for the rationale; both workflows must
# carry the flag so a release-time runtime change can't sneak in
# while the CI workflow keeps the new default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish clockify-sdk-ts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # needed to attach SBOM to the GH release
      id-token: write # required for npm provenance via OIDC
    defaults:
      run:
        working-directory: wrapper
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces (root)
        working-directory: .
        run: npm ci

      - name: Generate + sync TS SDK (local generator)
        working-directory: .
        run: make sdk-codegen

      - name: Sync, type-check, build (ESM + CJS), verify dual build
        run: |
          npm run type-check
          npm run build
          npm run build:smoke

      - name: Verify tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm (with provenance from publishConfig)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Generate SBOM (SPDX JSON)
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          npm sbom --sbom-format spdx --sbom-type library \
            > "../sbom-${GITHUB_REF_NAME}.spdx.json"
          echo "SBOM size: $(wc -c < ../sbom-${GITHUB_REF_NAME}.spdx.json) bytes"

      - name: Attach SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        working-directory: .
        run: |
          # Create the release if the workflow ran from a raw tag push.
          # gh release view exits non-zero when the release doesn't
          # exist; create + upload pattern is idempotent on rerun.
          if ! gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "See [wrapper/CHANGELOG.md](https://github.com/${REPOSITORY}/blob/${GITHUB_REF_NAME}/wrapper/CHANGELOG.md) for the full diff."
          fi
          gh release upload "$GITHUB_REF_NAME" \
            "sbom-${GITHUB_REF_NAME}.spdx.json" \
            --clobber

      - name: Post-publish smoke install (Docker, clean Node 22 environment)
        env:
          PKG_VERSION: ${{ github.ref_name }}
        run: |
          # Strip the leading 'v' for npm install.
          VERSION="${PKG_VERSION#v}"
          export VERSION
          docker run --rm -e VERSION="$VERSION" node:22-alpine sh -c '
            set -euo pipefail
            mkdir -p /tmp/smoke && cd /tmp/smoke
            npm init -y --silent > /dev/null
            npm install --silent "clockify-sdk-ts-115@${VERSION}" > /dev/null
            node --input-type=module -e "
              import(\"clockify-sdk-ts-115\").then(m => {
                const names = [\"ClockifyApiClient\",\"createClockifyClient\",\"composedFetch\",\"iterAll\",\"iterPages\",\"paginate\",\"verifyClockifyWebhook\",\"constructEvent\"];
                const missing = names.filter(n => typeof m[n] !== \"function\");
                if (missing.length) { console.error(\"Post-publish smoke FAILED (ESM):\", missing); process.exit(1); }
                console.log(\"Post-publish smoke OK (ESM): exposes\", names.length, \"names\");
              });
            "
            node -e "
              const m = require(\"clockify-sdk-ts-115\");
              const names = [\"ClockifyApiClient\",\"createClockifyClient\",\"composedFetch\",\"iterAll\",\"iterPages\",\"paginate\",\"verifyClockifyWebhook\",\"constructEvent\"];
              const missing = names.filter(n => typeof m[n] !== \"function\");
              if (missing.length) { console.error(\"Post-publish smoke FAILED (CJS):\", missing); process.exit(1); }
              console.log(\"Post-publish smoke OK (CJS): exposes\", names.length, \"names\");
            "
          '
