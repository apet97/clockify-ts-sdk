name: Release @apet97/clockify-cli-115 to npm

# Publishes @apet97/clockify-cli-115 to npm on a pushed `cli-v*.*.*` tag whose
# version matches cli/package.json. A manual `workflow_dispatch` run only
# type-checks, tests, builds, and dry-run packs — the publish step is gated to
# tag pushes (`github.ref_type == 'tag'`), so it never fires off a branch.
#
# Requires the NPM_TOKEN repo secret. Provenance is emitted via OIDC
# (id-token: write) from publishConfig.provenance in cli/package.json.
#
# Ordering: the CLI peer-depends on clockify-sdk-ts-115, so publish the SDK
# (push `wrapper-v*`) before pushing `cli-v*`.

on:
  push:
    tags:
      - "cli-v*.*.*"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish @apet97/clockify-cli-115
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # required for npm provenance via OIDC
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js 22.13.0
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22.13.0"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces (root)
        working-directory: .
        run: npm ci

      - name: Generate + sync TS SDK (local generator)
        working-directory: .
        run: |
          make sdk-codegen
          npm run build -w clockify-sdk-ts-115

      - name: Type-check, test, build
        run: |
          npm run type-check
          npm test
          npm run build

      - name: Pack (dry-run smoke before publish)
        run: npm pack --dry-run

      - name: Verify tag matches package version
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm (with provenance from publishConfig)
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
