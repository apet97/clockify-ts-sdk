name: CI (cli)

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "wrapper/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-cli.yml"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - "wrapper/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-cli.yml"

# See ci.yml for the rationale; the cli + mcp workflows mirror the
# wrapper's pin so a Node.js 20 force-promotion doesn't change runtime
# behaviour silently mid-flight.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: Build, type-check, test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspaces (root)
        run: npm ci

      # cli depends on clockify-sdk-ts-115 via the npm workspace link,
      # but cli's type-check + tests need the wrapper's built dist/.
      # Sync + build wrapper first or the CLI's type-check sees a
      # stale or missing surface and the tests can't exercise the SDK
      # boundary.
      - name: Generate + build wrapper
        run: |
          make sdk-codegen
          npm run build -w clockify-sdk-ts-115

      - name: Type-check
        working-directory: cli
        run: npm run type-check

      - name: Run tests
        working-directory: cli
        run: npm test

      - name: Lint
        if: matrix.node-version == '22'
        working-directory: cli
        run: npm run lint

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Pack snapshot verification
        # Only on node 22 (the release runner). Tarball contents are
        # node-version invariant.
        if: matrix.node-version == '22'
        working-directory: cli
        run: |
          # `make sdk-codegen` ran pack-snapshot in WRITE mode and overwrote the
          # committed cli/.packsnapshot; restore the blessed baseline so --check
          # diffs the built tarball against the committed source-of-truth.
          git checkout -- .packsnapshot
          node ../scripts/pack-snapshot.mjs --pkg=cli --check
