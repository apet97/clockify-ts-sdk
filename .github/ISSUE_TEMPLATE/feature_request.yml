name: Feature request
description: Propose a new helper, a new option, or an ergonomic improvement to the wrapper surface
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Before you submit:

        - **Method missing from the synced SDK?** That's a spec issue — file it against [apet97/go-clockify](https://github.com/apet97/go-clockify) so it lands in the generator.
        - **Idiomatic CRUDL method names** (`client.tags.list()` instead of `getWorkspacesWorkspaceIdTags`)? Tracked as `fern.x-fern-sdk-method-name.drops-resource-modules` in `spec/evidence/discrepancies.md` — re-evaluated on every Fern CLI bump, no action needed here.
        - **Bare-array auto-pagination at Fern level**? Tracked as `fern.x-fern-pagination.bare-array-unsupported`. Wrapper-side `iterAll` is the supported workaround.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do? Real-world scenario, not just "I want X."
      placeholder: "e.g. We have a workflow that fetches all time entries for the past 30 days across 50 users and we keep writing the same iterAll-with-flatten boilerplate..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Sketch the helper / option / change you have in mind. TypeScript snippets welcome.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: What existing wrapper helpers did you try first? Why don't they cover your case?
      placeholder: "e.g. iterAll handles per-resource pagination but doesn't combine across resources..."
    validations:
      required: true

  - type: textarea
    id: scope-impact
    attributes:
      label: Scope + maintenance impact
      description: How big is the surface change? Does it conflict with any documented constraint in AGENTS.md? Are you willing to send a PR?

  - type: checkboxes
    id: agreements
    attributes:
      label: Pre-submission checks
      options:
        - label: I read [AGENTS.md](https://github.com/apet97/clockify-ts-sdk/blob/main/AGENTS.md) to confirm this isn't out-of-scope.
          required: true
        - label: I searched [existing issues](https://github.com/apet97/clockify-ts-sdk/issues?q=is%3Aissue) for similar proposals.
          required: true
        - label: This is a wrapper-layer change, not a request for a method that's missing upstream in the spec.
          required: true
