name: Feature request
description: Propose an SDK helper, CLI command, MCP workflow/tool, docs path, mock/live scenario, or generator-contract improvement
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the user job first, then the API you want.

        - **Method missing from the synced SDK?** File it against [apet97/go-clockify](https://github.com/apet97/go-clockify) so it lands in the OpenAPI generator.
        - **Public rename or removal?** Read `docs/breaking-change-review-policy.md`; replacement-first migration evidence is required.
        - **High-risk write workflow?** Include dry-run, confirmation, receipt, cleanup, and sandbox boundaries.

  - type: dropdown
    id: target-surface
    attributes:
      label: Target surface
      multiple: true
      options:
        - SDK wrapper (`clockify-sdk-ts-115`)
        - CLI (`@clockify115/cli`)
        - MCP server (`@clockify115/mcp-server`)
        - OpenAPI / GOCLMCP / Fern generation contract
        - Examples / docs
        - Mock/replay / acceptance scenario
        - Release/support tooling
    validations:
      required: true

  - type: textarea
    id: user-job
    attributes:
      label: User job
      description: What real workflow are you trying to make easier?
      placeholder: "e.g. I need to invoice reviewed time entries and preserve request IDs for support..."
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: What existing SDK helper, CLI command, MCP tool, docs path, or generator path did you try first?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Sketch the helper, option, command, tool, docs path, or generator change.
      render: text
    validations:
      required: true

  - type: textarea
    id: acceptance-evidence
    attributes:
      label: Acceptance evidence
      description: Which acceptance scenario, mock/live proof, receipt fields, cleanup behavior, or generated truth surface should prove this works?
      placeholder: "docs/acceptance-scenarios.md row, mock route, live sandbox cleanup, receipt fields, operation coverage..."
    validations:
      required: true

  - type: dropdown
    id: breaking-change-risk
    attributes:
      label: Breaking-change risk
      multiple: false
      options:
        - Additive only
        - Requires alias or deprecation window
        - Renames or removes a public surface
        - Not sure
    validations:
      required: true

  - type: textarea
    id: maintenance-impact
    attributes:
      label: Scope + maintenance impact
      description: Docs, changelog, generated metadata, tests, live proof, or support-bundle implications.

  - type: checkboxes
    id: agreements
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for similar proposals.
          required: true
        - label: I stated the user job and current workaround, not only the desired API name.
          required: true
        - label: If this changes a public surface, I considered `docs/breaking-change-review-policy.md`.
          required: true
