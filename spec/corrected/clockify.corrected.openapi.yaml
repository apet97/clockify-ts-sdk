      summary: Generate a new webhook token
      description: |
        Verb is **PATCH only**. PUT to the same path returns
        `{"message":"Request method 'PUT' is not supported","code":3000}`.
        Request body is empty. Response is the full webhook with a
        rotated `authToken`; the previous token is invalidated.
      operationId: patchWorkspacesWorkspaceIdWebhooksWebhookIdToken
      security:
      - ApiKeyAuth: []
      - AddonTokenAuth: []
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: string
      - in: path
        name: webhookId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/WebhooksWebhook2"
          description: Webhook with new authToken.
        '405':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/WebhooksClockifyError"
          description: |
