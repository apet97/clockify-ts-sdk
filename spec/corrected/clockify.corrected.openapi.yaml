  description: |-
    Generated by scripts/gen-clockify-openapi from realOPENAPI, clockify-api-probe-lab, AIII/openapi.yaml, GOCLMCP coverage docs, and QA findings.
    Do not edit this file by hand; run `make gen-openapi` after source evidence changes.
    Operation vendor extensions preserve provenance, host, live status, MCP mapping, risk, raw unit notes, and known upstream quirks.
servers:
- url: https://api.clockify.me/api/v1
  description: Main Clockify API
- url: https://reports.api.clockify.me/v1
  description: Clockify reports and shared-reports API
- url: https://auditlog-api.api.clockify.me/v1
  description: Clockify audit-log API
