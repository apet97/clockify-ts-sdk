      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TimeOffTimeOffRequest"
          description: |
            Request created. If policy.approve.requiresApproval=false the
            status.statusType is APPROVED immediately; otherwise PENDING.
        '400':
          description: |
            Observed failure messages (real upstream wording):
              * "Please make sure that the datetime is in following format:
                 yyyy-MM-ddThh:mm:ssZ%n Example: 2018-11-29T13:00:46Z."
                 — emitted when start/end is not RFC3339 (date-only `YYYY-MM-DD` is rejected).
              * "must not be null" (code 501 in body, HTTP 400)
                 — emitted when `timeOffPeriod` is missing.
              * "Insufficient time off balance"
                 — policy with allowNegativeBalance:false and 0 balance.
              * "Value for number of days is not allowed"
                 — observed on every DAYS-time-unit policy in this workspace
                   regardless of request duration (1d, halfDay) or
                   allowNegativeBalance. HOURS policies accept identical shape.
                   Suspected workspace-level "days-per-request" config blocking
                   all DAYS-unit POSTs. Needs config-side confirmation.
        '403':
          description: '"Access Denied" when policyId does not belong to workspace/user.'
      x-clockify-evidence:
      - probe-fragment
      x-clockify-host: https://api.clockify.me/api/v1
      x-clockify-live-status: probe-documented
      x-clockify-mcp-tools: []
