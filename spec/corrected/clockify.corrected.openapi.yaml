      tags:
      - Files
      summary: Add a photo
      operationId: uploadImage
      security:
      - ApiKeyAuth: []
      - AddonTokenAuth: []
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  description: Image to be uploaded
                  format: binary
                  type: string
              required:
              - file
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              example:
                name: image-01234567.jpg
                url: https://clockify.com/image-01234567.jpg
              schema:
                "$ref": "#/components/schemas/ImageUploadResponse"
          description: Image upload response.
      x-clockify-evidence:
      - aiii-openapi
      - doc-md
      - probe-openapi
      - probe-supplement
      - real-openapi
      x-clockify-host: https://api.clockify.me/api/v1
      x-clockify-live-status: probe-documented
      x-clockify-mcp-tools: []
      x-clockify-risk:
      - write
      x-clockify-security-aliases:
        AddonTokenAuth:
          headers:
          - X-Addon-Key
          schemes:
          - AddonKeyAuth
        ApiKeyAuth:
          headers:
          - X-Api-Key
          schemes:
          - ApiKeyAuth
      x-clockify-source-files:
      - AIII/openapi.yaml
      - clockify-api-probe-lab/USERDOC.md
      - clockify-api-probe-lab/USEREXPENCUSTOMFIED.yaml
      - clockify-api-probe-lab/openapi.yaml
      - realOPENAPI/USEROPENAPI.YAML
  "/shared-reports/{sharedReportId}":
    get:
      tags:
      - Shared Reports
      summary: Public/bare GET of a shared report or export
      description: |
        Bare path (no workspace segment). Pass `?exportType=PDF|CSV|XLSX|JSON_V1`
        to receive a binary export with `Content-Disposition` filename. Without
        `exportType`, returns the shared-report JSON envelope.
      operationId: getSharedReportsSharedReportId
      servers:
      - url: https://reports.api.clockify.me/v1
      security:
      - ApiKeyAuth: []
      - AddonTokenAuth: []
      parameters:
      - in: query
        name: exportType
        schema:
          enum:
          - JSON_V1
          - JSON
          - CSV
          - XLSX
          - PDF
          type: string
      - in: path
        name: sharedReportId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SharedReport"
            application/pdf:
              schema:
                format: binary
                type: string
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                format: binary
                type: string
            text/csv:
              schema:
                type: string
          description: OK — JSON envelope when `exportType` omitted; binary export
            otherwise.
      x-clockify-evidence:
      - aiii-openapi
      - live-success
      - probe-openapi
      x-clockify-host: https://reports.api.clockify.me/v1
      x-clockify-live-status: live-success
      x-clockify-mcp-tools: []
      x-clockify-notes:
      - Reports and shared-reports use the reports API host, not the main API host.
      - Shared-report GET-by-id is bare /shared-reports/{id}; workspace-prefixed paths
        are used for list/create/update/delete.
      - "| GET | reports.api.clockify.me | /v1/shared-reports/{id} | **200** | fixtures/shared-reports/reports_single-get.json
        |"
      x-clockify-risk:
      - read
      x-clockify-source-files:
      - AIII/openapi.yaml
      - clockify-api-probe-lab/findings/shared-reports.md
      - clockify-api-probe-lab/openapi.yaml
