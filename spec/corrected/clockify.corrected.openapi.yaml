      - AddonTokenAuth: []
      parameters:
      - description: If provided, returns workspaces where the user has any of the
          specified roles. Owners are not counted as admins when filtering.
        example:
        - WORKSPACE_ADMIN
        - OWNER
        explode: true
        in: query
        name: roles
        required: false
        schema:
          items:
            enum:
            - WORKSPACE_ADMIN
            - OWNER
            - TEAM_MANAGER
            - PROJECT_MANAGER
